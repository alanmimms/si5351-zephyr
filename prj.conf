# Zephyr Configuration for Si5351 Testbed
# Target: ESP32-C3
# Standard: C++20

CONFIG_MAIN_STACK_SIZE=4096
CONFIG_SHELL_STACK_SIZE=4096
CONFIG_HEAP_MEM_POOL_SIZE=8192

# C++20 support
CONFIG_CPP=y
CONFIG_STD_CPP20=y
CONFIG_GLIBCXX_LIBCPP=y

# Console & Shell
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_SHELL=y
CONFIG_SHELL_PROMPT_UART="si5351:~$ "

# Peripherals
CONFIG_GPIO=y
CONFIG_I2C=y
CONFIG_I2C_SHELL=y

# Formatting / Printf
CONFIG_CBPRINTF_FP_SUPPORT=y
